name: SQLMesh Scheduled Production Run

on:
  schedule:
    - cron: '0 0 * * 1'
  workflow_dispatch:

jobs:
  run-sqlmesh:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.13' 

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install sqlmesh[postgres] pandas==2.3.3 

      - name: Run SQLMesh Plan Production
        env:
          POSTGRES_PASSWORD: ${{ secrets.POSTGRES_PASSWORD }} 
        run: |
          sqlmesh run prod 
      - name: Notify Discord on failure
        if: failure()
        run: |
          curl -H "Content-Type: application/json" \
            -d '{"content": " SQLMesh scheduled run failed on `${{ github.repository }}` — revisa el log: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}"}' \
            ${{ secrets.DISCORD_WEBHOOK_URL }}
